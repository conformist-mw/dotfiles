- hosts: hetzner
  roles:
    # Base system setup
    - { role: common, tags: [base, common] }
    - { role: vps, tags: [base, vps] }
    - {
        role: docker,
        tags: [base, docker],
        vars: { ansible_distribution_release: "bookworm" },
      }
    - { role: vim, tags: [base, vim] }
    - { role: vim, tags: [base, vim-root], vars: { user: "root" } }
    - { role: wireguard, tags: [base, wireguard] }
    - {
        role: watchtower,
        tags: [base, watchtower],
        vars: { watchtower_schedule: "0 0 10 * * *" },
      }

    # Infrastructure
    - { role: traefik-vps, tags: [infra, traefik] }
    - { role: tinyauth, tags: [infra, tinyauth] }
    - { role: pihole, tags: [infra, pihole] }
    - { role: crowdsec, tags: [infra, crowdsec] }

    # Applications
    - { role: dozzle, tags: [apps, dozzle] }
    - { role: glances, tags: [apps, glances] }
    - {
        role: homepage,
        tags: [apps, homepage],
        vars: { hostname_prefix: "dash.", path_prefix: "vps/" },
      }
    - { role: rsstt, tags: [apps, rsstt] }
    - { role: commeilfaut, tags: [apps, commeilfaut] }
    - { role: segments, tags: [apps, segments] }
    - { role: lessons, tags: [apps, lessons] }
    - { role: home-meters, tags: [apps, home-meters, "home_meters"] }
