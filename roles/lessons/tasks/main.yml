---
- name: Load lessons secrets (sops)
  community.sops.load_vars:
    file: "{{ role_path }}/vars/secrets.sops.yaml"

- name: Ensure lessons data directory
  ansible.builtin.file:
    path: "{{ lessons_dir }}"
    state: directory
    mode: "0755"

# No automatic seeding: the image no longer bundles the Excel file (it holds
# personal data). A fresh install starts empty; see DEPLOY.md in the lessons
# repo for the one-off manual import command.

- name: Lessons container
  community.docker.docker_container:
    image: "{{ lessons_image }}"
    pull: true
    name: lessons
    restart: true
    restart_policy: "unless-stopped"
    user: "{{ puid }}:{{ pgid }}"
    networks:
      - name: "{{ docker_network }}"
    env:
      TZ: "{{ tz }}"
      TELEGRAM_BOT_TOKEN: "{{ lessons_bot_token | default('') }}"
      TELEGRAM_WEBHOOK_URL: "https://lessons.{{ ansible_host }}{{ lessons_webhook_path | default('/tgwebhook') }}"
      TELEGRAM_WEBHOOK_SECRET: "{{ lessons_webhook_secret | default('') }}"
      TELEGRAM_ALLOWED_CHATS: "{{ lessons_allowed_chats | default('') }}"
      TELEGRAM_NOTIFY_CHAT: "{{ lessons_notify_chat | default('') }}"
      TELEGRAM_REMINDER_DELAY_MIN: "{{ lessons_reminder_delay_min | default('60') }}"
      ICS_TOKEN: "{{ lessons_ics_token | default('') }}"
    volumes:
      - "{{ lessons_dir }}:/data"
    labels:
      traefik.enable: "true"
      traefik.http.routers.lessons.entrypoints: "websecure"
      traefik.http.routers.lessons.tls: "true"
      traefik.http.routers.lessons.tls.certresolver: "letsencrypt"
      traefik.http.routers.lessons.rule: "Host(`lessons.{{ ansible_host }}`)"
      traefik.http.services.lessons.loadbalancer.server.port: "8080"
      traefik.http.routers.lessons.middlewares: "auth-chain@file"
      # Telegram webhook endpoint must bypass oauth so Telegram can POST to it.
      # The path itself is a secret (lives in SOPS), so the endpoint is not
      # discoverable from the public repo.
      traefik.http.routers.lessons-bot.entrypoints: "websecure"
      traefik.http.routers.lessons-bot.tls: "true"
      traefik.http.routers.lessons-bot.tls.certresolver: "letsencrypt"
      traefik.http.routers.lessons-bot.rule: "Host(`lessons.{{ ansible_host }}`) && PathPrefix(`{{ lessons_webhook_path | default('/tgwebhook') }}`)"
      traefik.http.routers.lessons-bot.middlewares: "no-auth-chain@file"
      traefik.http.routers.lessons-bot.service: "lessons"
      traefik.http.routers.lessons-bot.priority: "100"
      # ICS feed for HA's Remote Calendar — machine-to-machine, so it bypasses
      # auth and is guarded by the ICS_TOKEN query param instead.
      traefik.http.routers.lessons-ics.entrypoints: "websecure"
      traefik.http.routers.lessons-ics.tls: "true"
      traefik.http.routers.lessons-ics.tls.certresolver: "letsencrypt"
      traefik.http.routers.lessons-ics.rule: "Host(`lessons.{{ ansible_host }}`) && PathPrefix(`/calendar.ics`)"
      traefik.http.routers.lessons-ics.middlewares: "no-auth-chain@file"
      traefik.http.routers.lessons-ics.service: "lessons"
      traefik.http.routers.lessons-ics.priority: "100"
