- name: Ensure data directory exists
  ansible.builtin.file:
    path: "{{ app_data_dir }}"
    state: directory

- name: Install glances from pip
  ansible.builtin.pip:
    name: "glances[all]"
    state: present
    virtualenv: "{{ app_data_dir }}/.venv"

- name: Copy glances systemd service
  ansible.builtin.template:
    src: glances.service
    dest: /etc/systemd/system/glances.service
  become: true

- name: Enable glances
  ansible.builtin.systemd:
    name: glances.service
    enabled: yes
    state: started
    daemon_reload: yes
  become: true

- name: Expose glances to the container network (127.0.0.1 → docker net)
  ansible.builtin.include_role:
    name: expose_local_port
  vars:
    expose_name: "{{ app_name }}"
    expose_ports: ["{{ app_port }}"]
