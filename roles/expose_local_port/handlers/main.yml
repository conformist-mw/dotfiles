---
# Self-contained so the role works on any host/playbook (hetzner.yml has no
# play-level handlers import). Mirrors the play-level handlers used on beelink.
- name: save iptables ipv4
  community.general.iptables_state:
    state: saved
    path: /etc/iptables/rules.v4
    ip_version: ipv4
  become: true

- name: save iptables ipv6
  community.general.iptables_state:
    state: saved
    path: /etc/iptables/rules.v6
    ip_version: ipv6
  become: true
