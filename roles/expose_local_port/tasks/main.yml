---
# Expose one or more host-local (127.0.0.1) services to the Docker bridge
# network so containers can reach them via the network gateway — WITHOUT
# binding the service to a public interface.
#
# A container connects to {{ docker_gateway }}:<port>; the packet enters the
# host on the {{ docker_network }} bridge, PREROUTING DNATs it to 127.0.0.1:<port>
# where the native service listens. Requires net.ipv4.conf.{{ docker_network }}.
# route_localnet=1 (set persistently in /etc/sysctl.conf on the VPS).
#
# Persistence is declarative: a per-owner systemd oneshot (expose-<name>.service,
# After=docker.service) re-asserts exactly these rules at boot with `-C || -A`.
# We deliberately do NOT use iptables-save/netfilter-persistent — a blind table
# snapshot would also try to restore the crowdsec-firewall-bouncer's ipset rules
# before its ipsets exist (restore race) and resurrect stray rules.
#
# Caller sets:
#   expose_name:  <str>            # unique owner name (→ unit + Description)
#   expose_ports: [<tcp port>, ...] # host-local ports to expose

- name: "Install boot re-apply unit for {{ expose_name }}"
  ansible.builtin.template:
    src: expose-ports.service.j2
    dest: "/etc/systemd/system/expose-{{ expose_name }}.service"
    mode: "0644"
  become: true
  register: expose_unit

# Starting (or restarting on change) the oneshot applies the rules immediately,
# so the unit is the single source of truth for both boot and this Ansible run.
- name: "Enable + apply the expose unit for {{ expose_name }}"
  ansible.builtin.systemd:
    name: "expose-{{ expose_name }}.service"
    enabled: true
    state: "{{ 'restarted' if expose_unit.changed else 'started' }}"
    daemon_reload: true
  become: true
