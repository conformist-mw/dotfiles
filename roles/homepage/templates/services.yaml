- media:
    - Jellyfin:
        href: http://{{ ansible_host }}:8096
        description: "Media server"
        icon: "jellyfin"
        server: "local-docker"
        container: "jellyfin"
        showStats: true
        widget:
          type: jellyfin
          url: http://jellyfin:8096
          key: "{{ homepage_jellyfin_api_key }}"
          enableBlocks: true
          enableNowPlaying: true
          enableUser: true
          hideErrors: true
    - Navidrome:
        href: http://navidrome.{{ ansible_host }}
        description: "Music server"
        icon: "navidrome"
        server: "local-docker"
        container: "navidrome"
        showStats: true
    - Immich:
        href: http://photo.{{ ansible_host }}
        description: "Own photo collection"
        icon: "immich"
        server: "local-docker"
        container: "immich"
        showStats: true
        widget:
          type: immich
          url: http://immich:2283
          key: "{{ homepage_immich_api_key }}"
          version: 2
          hideErrors: true
    - QBittorrent:
        href: http://torrent.{{ ansible_host }}
        description: "Torrent client"
        icon: "qbittorrent"
        server: "local-docker"
        container: "torrent"
        widget:
          type: qbittorrent
          url: http://torrent:8080
          username: "{{ homepage_qbittorrent_username }}"
          password: "{{ homepage_qbittorrent_password }}"
          hideErrors: true

