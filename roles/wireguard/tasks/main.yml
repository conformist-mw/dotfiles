---
- name: Install wireguard tools
  ansible.builtin.apt:
    name:
      - wireguard
      - qrencode # used by the local onboard-client.sh helper
    state: present
    update_cache: true
  become: true

- name: Enable IPv4 forwarding
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    sysctl_set: true
    state: present
    reload: true
  become: true

# route_localnet (needed for the DNS -> 127.0.0.1 DNAT) is set per-interface
# inside the firewall script at PostUp time — the interface does not exist yet
# at this point on a fresh host, so it cannot be set here.

- name: Render per-interface firewall scripts
  ansible.builtin.template:
    src: wg-firewall.sh.j2
    dest: "/etc/wireguard/wg-firewall-{{ item.key }}.sh"
    owner: root
    group: root
    mode: "0700"
  loop: "{{ wg_interfaces | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  vars:
    iface_name: "{{ item.key }}"
    iface: "{{ item.value }}"
    ext_if: "{{ ansible_default_ipv4.interface }}"
  notify: restart wireguard
  become: true

- name: Remove legacy (pre-refactor) firewall scripts
  ansible.builtin.file:
    path: "/etc/wireguard/{{ item }}"
    state: absent
  loop:
    - post-up.sh
    - post-down.sh
  become: true

- name: Render interface configs
  ansible.builtin.template:
    src: wg.conf.j2
    dest: "/etc/wireguard/{{ item.key }}.conf"
    owner: root
    group: root
    mode: "0600"
  loop: "{{ wg_interfaces | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  vars:
    iface_name: "{{ item.key }}"
    iface: "{{ item.value }}"
  notify: restart wireguard
  become: true

- name: Enable and start interfaces
  ansible.builtin.systemd:
    name: "wg-quick@{{ item.key }}"
    enabled: true
    state: started
  loop: "{{ wg_interfaces | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  become: true
