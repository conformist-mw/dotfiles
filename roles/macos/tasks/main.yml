- name: config dirs
  file:
    path: "~/.{{ item }}"
    state: directory
  loop:
    - config/git
    - config/kitty
    - config/zed
    - config/atuin
    - config/agterm
    - config/revdiff

- name: Copy dotfiles
  copy:
    src: "dotfiles/{{ item }}"
    dest: "~/.{{ item }}"
    mode: '0644'
  loop:
    - justfile
    - zshrc
    - config/git/config
    - config/git/ignore
    - config/git/wt-config
    - config/starship.toml
    - config/kitty/kitty.conf
    - config/kitty/quick-access-terminal.conf
    - config/kitty/theme.conf
    - config/kitty/HOTKEYS.md
    - config/zed/keymap.json
    - config/zed/settings.json
    - config/zed/tasks.json
    - config/atuin/config.toml
    - config/agterm/ghostty.conf
    - config/agterm/keymap.conf
    - config/agterm/restore-denylist.conf
    - config/revdiff/config

- name: Link Brewfile
  file:
    src: "{{ playbook_dir }}/roles/macos/files/Brewfile"
    dest: ~/.Brewfile
    state: link
    force: true
  tags: install

- name: Install Homebrew packages from Brewfile
  command: brew bundle install --global
  register: brew_bundle
  changed_when: brew_bundle.stdout is regex('(Installing|Upgrading|Downloading)')
  tags: install

- name: Show Brewfile install/upgrade output
  debug:
    var: brew_bundle.stdout_lines
  tags: install

- name: Remove Homebrew packages not in Brewfile
  command: brew bundle cleanup --global --force
  register: brew_cleanup
  changed_when: "'Uninstalling' in brew_cleanup.stdout"
  tags:
    - install
    - cleanup

- name: Manage uv
  block:
    - name: uv install python
      command: >
        uv python install
        3.10
        3.11
        3.12
        3.13
        3.14
      register: uv_python
      changed_when: "'Installed' in uv_python.stderr"

    - name: Show uv python output
      debug:
        var: uv_python.stderr_lines

    - name: uv install tools
      command: uv tool install --python 3.12 {{ item }}
      loop:
        - black
        - ruff
        - ipython
        - smbclientng
        - spotdl
        - yt-dlp
      register: uv_tools
      changed_when: "'Installed' in uv_tools.stderr"

    - name: Show uv tool output
      debug:
        msg: "{{ item.item }}: {{ item.stderr_lines }}"
      loop: "{{ uv_tools.results }}"
      loop_control:
        label: "{{ item.item }}"
  tags: uv
