# agterm keymap — a kitty-flavored config for rebinding built-in shortcuts and defining
# custom shell commands. Edit this file and run File ▸ Reload Keymap (or `agtermctl keymap
# reload`) to apply. Blank lines and lines starting with `#` are ignored.
#
# Two verbs:
#
#   map <chord> <action>
#       Rebind a built-in action to a single chord (no leader sequences for built-ins).
#       Chords use kitty syntax: mods joined by `+`, e.g. `cmd+shift+d`, `ctrl+\``.
#       Mods: ctrl, cmd, opt, shift. Example:
#
#           map cmd+shift+d  toggle_split
#
#   command "<name>" [chord] <shell...>
#       Define a custom command, shown in the action palette marked `custom`. The quoted
#       name may contain spaces. An optional chord (single chord OR a leader like `ctrl+a>g`)
#       binds it to a key; the chord MUST include a modifier (a bare key is rejected and the
#       line becomes palette-only). Omit the chord for a palette-only command. The rest of the
#       line is run via `/bin/sh -c`. Examples:
#
#           command "Open in Zed"  cmd+shift+e  open -a Zed "$AGT_SESSION_PWD"
#           command "Lazygit"      ctrl+a>g     lazygit
#           command "Deploy"                    ./deploy.sh
#
# Built-in actions (raw name → shipped default chord):
#
#   new_window                  cmd+opt+n
#   rename_window               (no default)
#   delete_window               (no default)
#   new_workspace               cmd+shift+n
#   rename_workspace            (no default)
#   delete_workspace            (no default)
#   new_session                 cmd+n
#   open_directory              cmd+o
#   rename_session              (no default)
#   close_session               cmd+w
#   clear_status                (no default)
#   increase_font_size          (not expressible)
#   decrease_font_size          cmd+-
#   reset_font_size             cmd+0
#   toggle_split                cmd+d
#   toggle_scratch              cmd+j
#   toggle_search               cmd+f
#   toggle_sidebar              ctrl+cmd+s
#   select_theme                (no default)
#   toggle_flagged_view         (no default)
#   toggle_flag                 cmd+shift+f
#   focus_workspace             (no default)
#   focus_left_pane             (no default)
#   focus_right_pane            (no default)
#   previous_session            (no default)
#   next_session                (no default)
#   previous_attention_session  (no default)
#   next_attention_session      (no default)
#   first_session               (no default)
#   last_session                (no default)
#   quick_terminal              ctrl+`
#   session_palette             ctrl+p
#   command_palette             ctrl+shift+p
#   custom_command_palette      ctrl+shift+o
#
# Custom-command tokens (expanded in the shell line and exported as $AGT_X env vars):
#
#   {AGT_SESSION_ID}
#   {AGT_SESSION_NAME}
#   {AGT_SESSION_PWD}
#   {AGT_WORKSPACE_ID}
#   {AGT_WORKSPACE_NAME}
#   {AGT_WINDOW_ID}
#   {AGT_WINDOW_NAME}
#   {AGT_SELECTION}
#   {AGT_SOCKET}
#
# NOTE: a {AGT_X} token is substituted RAW into the /bin/sh line — convenient, but unsafe for
# content you don't control. {AGT_SELECTION} is the obvious case, but a remote host can also set
# the session title (OSC) and the working directory (OSC 7), so {AGT_SESSION_NAME} and
# {AGT_SESSION_PWD} are equally unsafe raw. For any such content prefer the matching $AGT_X
# environment variable, QUOTED, e.g. "$AGT_SELECTION".
#
# Uncomment and edit a line below to start.
# map cmd+shift+d toggle_split

# Review uncommitted changes with revdiff in a floating overlay over the active session.
# Absolute paths on BOTH the outer agtermctl and the overlay's revdiff: the custom-command shell
# (/bin/sh -c) and the overlay's own process both run with a minimal PATH that lacks
# /opt/homebrew/bin, so bare names fail with exit 127 (overlay flashes and vanishes). Absolute
# paths sidestep PATH entirely. $AGT_SESSION_PWD is quoted (safe) and expanded by /bin/sh.
command "Review diff (revdiff)" cmd+shift+d /opt/homebrew/bin/agtermctl session overlay open /opt/homebrew/bin/revdiff --cwd "$AGT_SESSION_PWD" --size-percent 90 --follow
