# themes
include ./theme.conf

copy_on_select yes

# terminal opacity and blur
background_opacity 1.0

# advance
term xterm-kitty
macos_option_as_alt no
enable_audio_bell no

# font
font_family      family="FiraCode Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 12.0

# font size management
map ctrl+shift+backspace change_font_size all 0

# cursor customization
# block / beam / underline
cursor_shape beam
cursor_blink_interval 0
cursor_stop_blinking_after 0
shell_integration disabled

# scrollback
scrollback_lines 25000
wheel_scroll_multiplier 3.0

# mouse
mouse_hide_wait -1

# window layout
remember_window_size  yes
initial_window_width  1200
initial_window_height 750
window_border_width 0.1pt
enabled_layouts splits,tall,fat,grid,stack
window_padding_width 5
window_margin_width 3
hide_window_decorations titlebar-only
single_window_margin_width 1

# tab bar customization
tab_bar_style powerline
tab_powerline_style angled
tab_bar_edge top
tab_bar_align left
active_tab_font_style   bold
inactive_tab_font_style normal
tab_title_template "[{index}] {title}"
tab_switch_strategy left

# tab bar enhancements
tab_bar_min_tabs 1
tab_bar_margin_height 1.0 0.0

# tab management
map ctrl+shift+t new_tab
map ctrl+shift+right next_tab
map ctrl+shift+left previous_tab
map ctrl+shift+q close_tab

# tab switching with cmd+number
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9
map cmd+0 goto_tab -1

# interactive tab selector
map cmd+e select_tab

# tab utilities
map cmd+shift+r set_tab_title
map cmd+shift+, move_tab_backward
map cmd+shift+. move_tab_forward

# search
map cmd+f launch --type=overlay --stdin-source=@screen_scrollback fzf --no-sort --no-mouse --exact -i --tac
map ctrl+f launch --type=overlay --stdin-source=@screen_scrollback --stdin-add-formatting bat --paging=always --style=numbers --color=always
map cmd+shift+f show_scrollback

# window management
map ctrl+shift+enter new_window
map ctrl+shift+] next_window
map ctrl+shift+[ previous_window

# splits
map cmd+d launch --location=vsplit --cwd=current
map cmd+shift+d launch --location=hsplit --cwd=current
map cmd+w close_window
map cmd+shift+[ previous_window
map cmd+shift+] next_window

# move focus between splits
map cmd+left neighboring_window left
map cmd+down neighboring_window down
map cmd+up neighboring_window up
map cmd+right neighboring_window right

# resize splits
map cmd+shift+left resize_window narrower
map cmd+shift+right resize_window wider
map cmd+shift+up resize_window taller
map cmd+shift+down resize_window shorter

# overlay windows (always full screen)
map cmd+o launch --type=overlay --cwd=current
map cmd+p launch --type=overlay --cwd=current /opt/homebrew/bin/lazygit

# ssh shortcuts
map cmd+g launch --type=tab sh -c "clear && ssh eugene@192.168.1.24 -p 22122"

# session shortcuts - load session into new OS window
map cmd+shift+s launch --type=os-window kitty --session ~/.config/kitty/example-session.conf

# git diff viewer with kitty's side-by-side view (cycles through changed files)
map cmd+i launch --type=overlay --cwd=current sh -c 'git difftool'
# git diff for staged changes
map cmd+shift+i launch --type=overlay --cwd=current sh -c 'git difftool --cached'

# layout management
map cmd+shift+space next_layout
map ctrl+alt+r goto_layout tall
map ctrl+alt+s goto_layout stack

# fullscreen toggle
map cmd+ctrl+f toggle_fullscreen

# =====================================================================
# Фикс русской раскладки (известная болячка kitty)
# Дублируем все cmd-/ctrl- шорткаты на русские буквы той же позиции
# =====================================================================

# tab management (RU)
map ctrl+shift+е new_tab          # t
map ctrl+shift+й close_tab        # q

# tab switching cmd+number — цифры одинаковые, не нужно дублировать

# tab utilities (RU)
map cmd+shift+к set_tab_title     # r
map cmd+у select_tab              # e

# search (RU)
map cmd+а launch --type=overlay --stdin-source=@screen_scrollback fzf --no-sort --no-mouse --exact -i --tac      # f
map ctrl+а launch --type=overlay --stdin-source=@screen_scrollback --stdin-add-formatting bat --paging=always --style=numbers --color=always  # f
map cmd+shift+а show_scrollback   # f

# window/split management (RU)
map cmd+в launch --location=vsplit --cwd=current        # d
map cmd+shift+в launch --location=hsplit --cwd=current  # d
map cmd+ц close_window            # w

# overlay (RU)
map cmd+щ launch --type=overlay --cwd=current                                # o
map cmd+з launch --type=overlay --cwd=current /opt/homebrew/bin/lazygit      # p

# ssh (RU)
map cmd+п launch --type=tab sh -c "clear && ssh eugene@192.168.1.24 -p 22122"  # g

# session (RU)
map cmd+shift+ы launch --type=os-window kitty --session ~/.config/kitty/example-session.conf  # s

# git diff (RU)
map cmd+ш launch --type=overlay --cwd=current sh -c 'git difftool'             # i
map cmd+shift+ш launch --type=overlay --cwd=current sh -c 'git difftool --cached'  # i

# базовые системные команды копирования/вставки/выделения (RU)
map cmd+с copy_to_clipboard       # c
map cmd+м paste_from_clipboard    # v
map cmd+ч cut_to_clipboard        # x
map cmd+ф select_all              # a
map cmd+я undo                    # z (для интерактивных инпутов)
map cmd+= change_font_size all +1.0
map cmd+- change_font_size all -1.0
map cmd+0 change_font_size all 0

