"$schema" = 'https://starship.rs/config-schema.json'

command_timeout = 2000

# ── Prompt layout ─────────────────────────────────────────────
[line_break]
disabled = false

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

# ── Command duration (replaces oh-my-zsh timer) ──────────────
[cmd_duration]
min_time = 500
format = "took [$duration]($style) "

# ── Exit code ─────────────────────────────────────────────────
[status]
disabled = false
symbol = " "

# ── Time ──────────────────────────────────────────────────────
[time]
disabled = false

# ── Battery ───────────────────────────────────────────────────
[[battery.display]]
threshold = 35

# ── Git ───────────────────────────────────────────────────────
[git_branch]
symbol = " "

[git_commit]
tag_symbol = '  '

[git_status]
ahead = "⇡${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
behind = "⇣${count}"
modified = "!${count}"
untracked = "?${count}"
stashed = "s${count}"
staged = "+${count}"
deleted = "x${count}"

# ── Directory ─────────────────────────────────────────────────
[directory]
read_only = " 󰌾"
truncation_length = 5
truncation_symbol = "…/"

# ── Cloud & Infrastructure ────────────────────────────────────
[aws]
symbol = " "

[kubernetes]
disabled = false
symbol = "☸ "

[terraform]
symbol = "💠 "

[docker_context]
symbol = " "

# ── SSH ───────────────────────────────────────────────────────
[hostname]
ssh_symbol = " "

# ── Languages & Runtimes (Nerd Fonts v3 preset icons) ────────
[python]
symbol = " "

[nodejs]
symbol = " "

[golang]
symbol = " "

[rust]
symbol = "󱘗 "

[package]
symbol = "󰏗 "

# ── OS symbols ────────────────────────────────────────────────
[os.symbols]
Macos = " "
