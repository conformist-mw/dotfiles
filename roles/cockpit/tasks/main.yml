- name: Install cockpit from backports
  ansible.builtin.apt:
    name:
      - cockpit
      - cockpit-machines
    state: present
    update_cache: yes
    default_release: "{{ ansible_distribution_release }}-backports"
  become: true

- name: Copy templates
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: root
    group: root
    mode: 0644
  loop:
    - { src: "cockpit.socket", dest: "/etc/systemd/system/cockpit.socket" }
    - { src: "cockpit.conf", dest: "/etc/cockpit/cockpit.conf" }
  become: true

- name: reload cockpit
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: yes
    state: started
    daemon_reload: yes
  loop:
    - "cockpit.socket"
    - "cockpit.service"
  become: true

- name: Expose cockpit to the container network (127.0.0.1 → docker net)
  ansible.builtin.include_role:
    name: expose_local_port
  vars:
    expose_ports: [9090]
