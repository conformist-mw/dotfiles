---
- name: Ensure home-meters data directory
  ansible.builtin.file:
    path: "{{ app_data_dir }}"
    state: directory
    mode: "0755"

- name: Check if prod DB exists
  ansible.builtin.stat:
    path: "{{ app_data_dir }}/meters.db"
  register: home_meters_db

- name: Check local seed DB is available
  ansible.builtin.stat:
    path: "{{ home_meters_seed_db }}"
  delegate_to: localhost
  become: false
  register: home_meters_seed_stat
  when: (not home_meters_db.stat.exists) or (home_meters_reseed | bool)

# When the local DB has uncommitted WAL changes (e.g. recent manual edits via
# sqlite3 CLI), copying only the .db file leaves those changes behind. Force
# a checkpoint so the main file is canonical before copy.
- name: Checkpoint local WAL before reseed
  ansible.builtin.command:
    cmd: sqlite3 "{{ home_meters_seed_db }}" "PRAGMA wal_checkpoint(TRUNCATE);"
  delegate_to: localhost
  become: false
  changed_when: false
  when:
    - home_meters_seed_stat.stat is defined and home_meters_seed_stat.stat.exists
    - (not home_meters_db.stat.exists) or (home_meters_reseed | bool)

- name: Fail fast if no prod DB and no local seed
  ansible.builtin.fail:
    msg: >-
      Production DB not found at {{ app_data_dir }}/meters.db and the local
      seed file ({{ home_meters_seed_db }}) is also missing. Run cmd/import
      locally to produce data/meters.db before deploying.
  when:
    - not home_meters_db.stat.exists
    - home_meters_seed_stat.stat is defined and not home_meters_seed_stat.stat.exists

- name: Stop container before reseed
  when: home_meters_reseed | bool and home_meters_seed_stat.stat is defined and home_meters_seed_stat.stat.exists
  community.docker.docker_container:
    name: "{{ app_name }}"
    state: stopped
  failed_when: false

- name: Seed prod DB (first deploy or forced reseed)
  when:
    - home_meters_seed_stat.stat is defined and home_meters_seed_stat.stat.exists
    - (not home_meters_db.stat.exists) or (home_meters_reseed | bool)
  ansible.builtin.copy:
    src: "{{ home_meters_seed_db }}"
    dest: "{{ app_data_dir }}/meters.db"
    owner: "{{ puid }}"
    group: "{{ pgid }}"
    mode: "0644"
    force: true

- name: Include labels generator
  ansible.builtin.include_role:
    name: labels_generator
  vars:
    additional_labels: "{{ home_meters_extra_labels }}"

- name: Home-meters container
  community.docker.docker_container:
    image: "{{ home_meters_image }}"
    pull: true
    name: "{{ app_name }}"
    restart: true
    restart_policy: "unless-stopped"
    user: "{{ puid }}:{{ pgid }}"
    networks:
      - name: "{{ docker_network }}"
    env:
      TZ: "{{ tz }}"
    volumes:
      - "{{ app_data_dir }}:/data"
    labels: "{{ labels }}"
