---
# Home Assistant OS as a KVM/QEMU guest managed by libvirt.
#
# This role is adopt-safe: if the domain already exists it only ensures the
# host prerequisites, autostart and running state — it never redefines the
# domain or touches the data disk. The VM is only provisioned from scratch
# when it is absent (fresh host / disaster recovery, then restore from an HA
# backup — the qcow2 disk, swtpm state and nvram are NOT reproducible here).

ha_vm_name: "hass"
# Pinned so the existing swtpm/nvram state (keyed by UUID) keeps matching and
# the router's DHCP reservation (MAC -> 192.168.1.223) stays stable.
ha_vm_uuid: "fb1839c4-8554-4d7d-adc9-41fef32c85ca"
ha_vm_mac: "52:54:00:16:c4:6e"
ha_vm_memory_mib: 4096
ha_vm_vcpus: 2

# HAOS disk image.
ha_image_version: "13.2"
ha_image_name: "haos_ova-{{ ha_image_version }}.qcow2"
ha_image_url: "https://github.com/home-assistant/operating-system/releases/download/{{ ha_image_version }}/{{ ha_image_name }}.xz"
ha_images_dir: "/var/lib/libvirt/images/hassos-vm"
ha_disk_path: "{{ ha_images_dir }}/{{ ha_image_name }}"

# LAN bridge the VM attaches to. The Zigbee coordinator is reached over IP
# (SLZB stick), so no USB/PCI host passthrough is needed.
ha_bridge: "br0"
ha_bridge_iface: "enp1s0"

# UEFI firmware (OVMF 4M) — Ubuntu paths. HAOS requires UEFI + TPM 2.0.
ha_ovmf_code: "/usr/share/OVMF/OVMF_CODE_4M.fd"
ha_ovmf_vars_template: "/usr/share/OVMF/OVMF_VARS_4M.fd"

# Editing netplan over SSH can drop connectivity, so the bridge is only
# touched when explicitly opted in (the existing host is already bridged).
ha_manage_network: false

# Daily backup of HA's recorder database. HA's history lives in the shared
# Postgres container (roles/beelink), NOT inside the HAOS VM — so it is not
# captured by HA's own full backups. This dump is consumer-owned (lives with
# the HA role) and covers only the homeassistant DB.
# Codify the recorder DB + login role so a fresh host is restore-ready
# (empty DB/role created here → pg_restore the dump → HA connects via its
# db_url). Idempotent: never touches an existing role/db, so it's a no-op on
# the current host. ha_db_password MUST equal the password in HA's recorder
# db_url (it lives in sops); a mismatch breaks a from-scratch restore.
ha_db_create_enabled: true
ha_db_user: "homeassistant"
# ha_db_password comes from group_vars secrets (sops).

ha_db_backup_enabled: true
ha_db_name: "homeassistant"
ha_db_pg_container: "postgres"
ha_db_pg_user: "postgres"
# TODO: source from group_vars secrets (beelink still hardcodes POSTGRES_PASSWORD).
ha_db_pg_password: "postgres"
ha_db_backup_dir: "{{ data_dir }}/backups/homeassistant-db"
ha_db_backup_keep: 7                       # keep newest N daily dumps on disk
ha_db_backup_oncalendar: "*-*-* 03:30:00"  # after HA full backup (03:00)
